<!DOCTYPE html>
<html>
<head>
  <title>Form Detection</title>
</head>
<body>
  <!-- This file exists for Netlify Forms deploy-time detection with Next.js -->
  <!-- The form structure must match the dynamic form in the application -->

  <form name="contact-form" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="contact-form" />
    <input name="bot-field" type="text" />
    <input name="name" type="text" />
    <input name="Piece" type="text" />
    <input name="email" type="email" />
    <textarea name="message"></textarea>
    <input name="terms" type="checkbox" />
  </form>
</body>
</html>
